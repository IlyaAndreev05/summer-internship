x-common: &common
  ulimits:
    nofile:
      soft: 1048576
      hard: 1048576
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: 100m
      max-file: 5

x-env: &env
  env_file: .env

services:
  app:
    <<: [*common, *logging, *env]
    build: .
    stdin_open: true
    environment:
      - PYTHONUNBUFFERED=1
      - APP_MODE=${APP_MODE:-console}
    volumes:
      - ./docs:/app/docs:ro
      - ./projects:/app/projects:ro
      - ./tests:/app/tests:ro
      - ./data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  ollama:
    <<: [*common, *logging, *env]
    image: ollama/ollama:0.31.1
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 5
        ollama pull ${LLM_MODEL:-qwen2.5:1.5b}
        ollama pull ${EMBED_MODEL:-nomic-embed-text}
        wait
    deploy:
      resources:
        limits:
          memory: 8G
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  qdrant:
    <<: [*common, *logging]
    image: qdrant/qdrant:v1.18.2
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 15s
      timeout: 10s
      retries: 5

  postgres:
    <<: [*common, *logging, *env]
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-alina}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-alina}
      - POSTGRES_DB=${POSTGRES_DB:-alina}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alina} -d ${POSTGRES_DB:-alina}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ollama_data:
  qdrant_data:
  postgres_data:
